# docker-compose-2full.yml — full stack: postgres, nats, ollama, authority,
# control-plane, 3 worker, agent-registry (stub), memory-service (stub), gateway (stub)
version: '3.8'

services:

  # ---------------------
  # PERSISTENCE
  # ---------------------
  postgres:
    image: postgres:16-alpine
    container_name: hyperspace_postgres
    environment:
      POSTGRES_USER: hyperspace_user
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_DB: hyperspace_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hyperspace
    restart: always

  # ---------------------
  # EVENT BUS
  # ---------------------
  nats:
    image: nats:latest
    container_name: hyperspace_nats
    ports:
      - "4222:4222"
    networks:
      - hyperspace
    restart: always

  # ---------------------
  # OLLAMA — LLM locale
  # ---------------------
  ollama:
    image: ollama/ollama:latest
    container_name: hyperspace_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - hyperspace
    restart: unless-stopped
    # GPU Nvidia — decommentare per abilitare:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ---------------------
  # AUTHORITY
  # ---------------------
  authority:
    build:
      context: .
      dockerfile: authority/Dockerfile
    container_name: hyperspace_authority
    ports:
      - "8081:8080"
    environment:
      PYTHONUNBUFFERED: "1"
    depends_on:
      - postgres
      - nats
    networks:
      - hyperspace
    restart: always

  # ---------------------
  # CONTROL PLANE
  # ---------------------
  control-plane:
    build:
      context: .
      dockerfile: control-plane/Dockerfile
    container_name: hyperspace_control_plane
    ports:
      - "8085:8085"
    environment:
      PYTHONUNBUFFERED: "1"
    depends_on:
      - authority
      - nats
    networks:
      - hyperspace
    restart: always

  # ---------------------
  # AGENT REGISTRY (stub — futuro microservizio)
  # ---------------------
  agent-registry:
    image: python:3.12-slim
    container_name: hyperspace_agent_registry
    command: python -c "
import http.server, json, threading
class H(http.server.BaseHTTPRequestHandler):
    def log_message(self, *a): pass
    def do_GET(self):
        self.send_response(200); self.send_header('Content-Type','application/json'); self.end_headers()
        self.wfile.write(json.dumps({'status':'ok','service':'agent-registry','agents':[]}).encode())
    def do_POST(self):
        self.send_response(200); self.send_header('Content-Type','application/json'); self.end_headers()
        self.wfile.write(json.dumps({'status':'registered'}).encode())
http.server.HTTPServer(('0.0.0.0',8082),H).serve_forever()"
    ports:
      - "8082:8082"
    networks:
      - hyperspace
    restart: always

  # ---------------------
  # MEMORY SERVICE (stub — futuro microservizio)
  # ---------------------
  memory-service:
    image: python:3.12-slim
    container_name: hyperspace_memory_service
    command: python -c "
import http.server, json
class H(http.server.BaseHTTPRequestHandler):
    def log_message(self, *a): pass
    def do_GET(self):
        self.send_response(200); self.send_header('Content-Type','application/json'); self.end_headers()
        self.wfile.write(json.dumps({'status':'ok','service':'memory-service','memories':[]}).encode())
    def do_POST(self):
        self.send_response(200); self.send_header('Content-Type','application/json'); self.end_headers()
        self.wfile.write(json.dumps({'status':'stored'}).encode())
http.server.HTTPServer(('0.0.0.0',8083),H).serve_forever()"
    ports:
      - "8083:8083"
    networks:
      - hyperspace
    restart: always

  # ---------------------
  # GATEWAY (stub — futuro microservizio)
  # ---------------------
  gateway:
    image: python:3.12-slim
    container_name: hyperspace_gateway
    command: python -c "
import http.server, json
class H(http.server.BaseHTTPRequestHandler):
    def log_message(self, *a): pass
    def do_GET(self):
        self.send_response(200); self.send_header('Content-Type','application/json'); self.end_headers()
        self.wfile.write(json.dumps({'status':'ok','service':'gateway'}).encode())
http.server.HTTPServer(('0.0.0.0',80),H).serve_forever()"
    ports:
      - "8090:80"
    depends_on:
      - authority
      - control-plane
      - nats
    networks:
      - hyperspace
    restart: always

  # ---------------------
  # WORKER NODES
  # ---------------------
  worker-1:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: hyperspace_worker_1
    ports:
      - "8084:8084"
    environment:
      WORKER_ID: worker-1
      WORKER_PORT: "8084"
      AUTHORITY_URL: http://authority:8080
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: phi3
      NATS_URL: nats://nats:4222
      PYTHONUNBUFFERED: "1"
    depends_on:
      - authority
      - nats
      - ollama
    networks:
      - hyperspace
    restart: always

  worker-2:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: hyperspace_worker_2
    ports:
      - "8086:8084"
    environment:
      WORKER_ID: worker-2
      WORKER_PORT: "8084"
      AUTHORITY_URL: http://authority:8080
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: phi3
      NATS_URL: nats://nats:4222
      CAPACITY_CPU: "6"
      CAPACITY_MEM_GB: "16"
      PYTHONUNBUFFERED: "1"
    depends_on:
      - authority
      - nats
      - ollama
    networks:
      - hyperspace
    restart: always

  worker-3:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: hyperspace_worker_3
    ports:
      - "8087:8084"
    environment:
      WORKER_ID: worker-3
      WORKER_PORT: "8084"
      AUTHORITY_URL: http://authority:8080
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: phi3
      NATS_URL: nats://nats:4222
      CAPACITY_CPU: "2"
      CAPACITY_MEM_GB: "4"
      PYTHONUNBUFFERED: "1"
    depends_on:
      - authority
      - nats
      - ollama
    networks:
      - hyperspace
    restart: always

networks:
  hyperspace:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
