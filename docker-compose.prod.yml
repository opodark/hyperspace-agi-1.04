version: '3.8'

# ============================================================
# HyperSpace AGI v0.2 — Compose PRODUZIONE
#
# Ollama NON è incluso: deve girare sull'host (nativo o LM Studio).
# Usa setup.sh per la configurazione guidata.
#
# Dashboard:   http://localhost:8085/dashboard
# Open WebUI:  http://localhost:3000
# Node API:    http://localhost:8084/status
# ============================================================

services:

  # ── Open WebUI ───────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: hyperspace_open_webui
    ports:
      - "3000:8080"
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      # Punta a Ollama nativo sull'host
      OLLAMA_BASE_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-hyperspace-secret-change-me}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hyperspace
    restart: unless-stopped

  # ── Nodo agente locale ───────────────────────────────────────────
  node:
    build:
      context: .
      dockerfile: node/Dockerfile
    container_name: hyperspace_node
    ports:
      - "8084:8084"
    volumes:
      - ./data/node:/app/data
    environment:
      NODE_HOSTNAME: ${NODE_HOSTNAME:-node}
      NODE_PORT: "8084"
      DATA_DIR: /app/data
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-phi3}
      # Peer remoti (es. nodi Tailscale): usa IP host, NON Tailscale IP
      # perché i container non vedono la VPN. Il traffico esce dall'host.
      # Esempio: BOOT_PEERS=100.x.x.x:8084
      BOOT_PEERS: ${BOOT_PEERS:-}
      NODE_TIER: ${NODE_TIER:-leaf}
      VRAM_GB: ${VRAM_GB:-0.0}
      AUTHORITY_ENABLED: "false"
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Usa la rete dell'host per accedere a Tailscale e ai peer remoti
    # NOTA: su macOS network_mode host non è supportato,
    #       ma extra_hosts sopra è sufficiente perché Docker Desktop
    #       gestisce il routing verso l'host nativamente.
    networks:
      - hyperspace
    restart: unless-stopped

  # ── Control Plane + Dashboard ────────────────────────────────────
  control-plane:
    build:
      context: .
      dockerfile: control-plane/Dockerfile
    container_name: hyperspace_control_plane
    depends_on: [node]
    ports:
      - "8085:8085"
    environment:
      # Nodo locale: usa nome servizio Docker
      # Nodi remoti: usa IP Tailscale (es: 100.x.x.x:8084)
      # I container raggiungono gli IP Tailscale tramite l'host
      # grazie a extra_hosts host.docker.internal:host-gateway
      # MA per Tailscale su Linux devi usare host-gateway IP diretto.
      #
      # Formato: NODE_ENDPOINTS=node:8084,100.x.x.x:8084
      NODE_ENDPOINTS: ${NODE_ENDPOINTS:-node:8084}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-phi3}
      AUTHORITY_ENABLED: "false"
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hyperspace
    restart: unless-stopped

  # ── Ollama-in-Docker (legacy, opzionale) ──────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: hyperspace_ollama
    profiles: ["with-ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - hyperspace
    restart: unless-stopped

networks:
  hyperspace:
    driver: bridge

volumes:
  open_webui_data:
  ollama_data:
