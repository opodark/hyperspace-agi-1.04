version: '3.8'

# ============================================================
# HyperSpace AGI v0.2 — Compose PRODUZIONE
#
# Ollama NON è incluso: deve girare sull'host (nativo).
# Usa setup.sh / setup.ps1 per la configurazione guidata.
#
# Backend supportati:
#   Ollama nativo:   OLLAMA_URL=http://host.docker.internal:11434
#   LM Studio:       OLLAMA_URL=http://host.docker.internal:1234
#   Ollama Docker:   OLLAMA_URL=http://ollama:11434  (profile: with-ollama)
#
# Deploy: docker compose -f docker-compose.prod.yml up -d --build
# ============================================================

services:

  # ── Nodo HyperSpace ────────────────────────────────
  node:
    build:
      context: .
      dockerfile: node/Dockerfile
    container_name: hyperspace_node
    ports:
      - "8084:8084"
    volumes:
      - ./data/node:/app/data
    environment:
      NODE_HOSTNAME: ${NODE_HOSTNAME:-localhost}
      NODE_PORT: "8084"
      DATA_DIR: /app/data
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-phi3}
      BOOT_PEERS: ${BOOT_PEERS:-}
      AUTHORITY_ENABLED: "false"
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hyperspace
    restart: unless-stopped

  # ── Control Plane + Dashboard ──────────────────────
  control-plane:
    build:
      context: .
      dockerfile: control-plane/Dockerfile
    container_name: hyperspace_control_plane
    depends_on: [node]
    ports:
      - "8085:8085"
    environment:
      NODE_ENDPOINTS: ${NODE_ENDPOINTS:-node:8084}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-phi3}
      AUTHORITY_ENABLED: "false"
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hyperspace
    restart: unless-stopped

  # ── Ollama-in-Docker (OPZIONALE, legacy) ──────────────
  # Abilitato solo con: --profile with-ollama
  # Usato automaticamente dal setup.sh se scegli opzione 3.
  ollama:
    image: ollama/ollama:latest
    container_name: hyperspace_ollama
    profiles: ["with-ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - hyperspace
    restart: unless-stopped

networks:
  hyperspace:
    driver: bridge

volumes:
  ollama_data:
