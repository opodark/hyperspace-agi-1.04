version: '3.9'

# ============================================================
# HyperSpace AGI — Windows host "primary-brain" (asus-v3607-main)
#
# Ollama resta sul Windows host; HyperSpace e i servizi accessori
# girano in Docker. host.docker.internal fa parlare i container
# con Ollama sull'host.
#
# NOTE:
#  - hyperspace-core builda control-plane/Dockerfile (main.py, v1.02),
#    che espone la porta 8085 e legge OLLAMA_URL / OLLAMA_MODEL, non
#    ancora HS_MODEL_GENERAL / HS_MODEL_CODER / HS_CONFIG_DIR ecc.
#    Qui sotto mappiamo i nuovi env sui vecchi così il servizio parte
#    funzionante; il routing generale/coder e i path HS_* restano
#    predisposti per quando control-plane verrà aggiornato al nuovo
#    schema 1.04.
#  - registry / node-1 / searxng / bridge / memory-graph / obsidian sono
#    lo stesso stack mesh di v1.02, portato qui e riletto sui path/env
#    Windows (host.docker.internal, .env.windows).
#    Tutte le variabili "mesh" non definite in .env.windows (REGISTRY_
#    PUBLIC_URL, PUBLIC_ENDPOINT, ecc.) usano i default già presenti
#    in v1.02 tramite ${VAR:-default}.
#
# Uso:
#   cp .env.windows .env
#   docker compose -f docker-compose.windows.yml up -d --build
#
# (Compose interpola le ${VAR} nello YAML solo da un file chiamato
# letteralmente .env accanto al compose file, non da env_file: — da qui
# la copia. Stessa convenzione di docker-compose.prod.yml con .env.mac
# / .env.ubuntu.)
#
# Dashboard core:    http://localhost:8088
# Open WebUI:        http://localhost:3000
# Registry:          http://localhost:8086
# Node 1:            http://localhost:8081/status
# SearXNG:           http://localhost:8092
# Infra-UI Bridge:   http://localhost:8099
# Memory Graph:      http://localhost:8090/status
# Obsidian GUI:      http://localhost:8091
# ============================================================

services:
  hyperspace-core:
    build:
      context: .
      dockerfile: control-plane/Dockerfile
    container_name: hyperspace-core
    restart: ${RESTART_POLICY}
    depends_on:
      hyperspace-registry:
        condition: service_healthy
      hyperspace-node-1:
        condition: service_started
      hyperspace-searxng:
        condition: service_started
    env_file:
      - ./.env
    environment:
      TZ: ${TZ}
      LOG_LEVEL: ${LOG_LEVEL}
      # schema attuale letto da control-plane/main.py
      OLLAMA_URL: ${OLLAMA_RAW_BASE_URL}
      OLLAMA_MODEL: ${HS_MODEL_GENERAL}
      INFERENCE_BACKEND: ollama
      REGISTRY_URL: http://hyperspace-registry:${REGISTRY_PORT:-8086}
      REGISTRY_PUBLIC_URL: "${REGISTRY_PUBLIC_URL:-https://sanctuary-mower-plated.ngrok-free.dev}"
      NODE_ENDPOINTS: "${NODE_ENDPOINTS:-hyperspace-node-1:8084}"
      SEARXNG_URL: http://hyperspace-searxng:8080
      MEMORY_TTL_DAYS: "${MEMORY_TTL_DAYS:-7}"
      MEMORY_MAX_ENTRIES: "${MEMORY_MAX_ENTRIES:-200}"
      # nuovo schema 1.04 — predisposto, non ancora consumato da main.py
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_CHAT_BASE_URL: ${OLLAMA_CHAT_BASE_URL}
      OLLAMA_RAW_BASE_URL: ${OLLAMA_RAW_BASE_URL}
      HS_MODEL_GENERAL: ${HS_MODEL_GENERAL}
      HS_MODEL_GENERAL_FALLBACK: ${HS_MODEL_GENERAL_FALLBACK}
      HS_MODEL_CODER: ${HS_MODEL_CODER}
      HS_MODEL_CODER_FALLBACK: ${HS_MODEL_CODER_FALLBACK}
      HS_DEFAULT_MODEL_ROLE: ${HS_DEFAULT_MODEL_ROLE}
      HS_ENABLE_MODEL_ROUTING: ${HS_ENABLE_MODEL_ROUTING}
      HS_ENABLE_CODE_AGENT: ${HS_ENABLE_CODE_AGENT}
      HS_ENABLE_MEMORY: ${HS_ENABLE_MEMORY}
      HS_ENABLE_TOOL_USE: ${HS_ENABLE_TOOL_USE}
      OLLAMA_REQUEST_TIMEOUT: ${OLLAMA_REQUEST_TIMEOUT}
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${HS_CONFIG_DIR}:/app/config
      - ${HS_DATA_DIR}:/app/data
      - ${HS_MEMORY_DIR}:/app/memory
      - ${HS_LOG_DIR}:/app/logs
    ports:
      - "127.0.0.1:8088:8085"

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: hyperspace-webui
    restart: ${RESTART_POLICY}
    env_file:
      - ./.env
    environment:
      # WebUI deve parlare al control-plane OpenAI-compatible (/v1/chat/completions),
      # non a Ollama diretto: solo così passa dal routing nodo + tool-calling loop
      # (incluso il tool web_search). OLLAMA_BASE_URL resta solo su hyperspace-core/hyperspace-node-1.
      OPENAI_API_BASE_URL: "http://hyperspace-core:8085/v1"
      OPENAI_API_KEY: "dummy"
      WEBUI_AUTH: "false"
      WEBUI_NAME: "HyperSpace Control"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${HS_DATA_DIR}/open-webui:/app/backend/data
    ports:
      - "127.0.0.1:3000:8080"
    depends_on:
      - hyperspace-core

  # -- Registry -------------------------------------------------------------
  hyperspace-registry:
    build:
      context: ./registry
      dockerfile: Dockerfile
    container_name: hyperspace-registry
    restart: ${RESTART_POLICY}
    env_file:
      - ./.env
    environment:
      TZ: ${TZ}
      REGISTRY_PORT: "${REGISTRY_PORT:-8086}"
      NODE_TTL: "${NODE_TTL:-300}"
      REGISTRY_PUBLIC_URL: "${REGISTRY_PUBLIC_URL:-https://sanctuary-mower-plated.ngrok-free.dev}"
      PYTHONUNBUFFERED: "1"
    ports:
      - "127.0.0.1:${REGISTRY_PORT:-8086}:${REGISTRY_PORT:-8086}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${REGISTRY_PORT:-8086}/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # -- SearXNG (web search self-hosted, usato dal tool web_search) ---------
  hyperspace-searxng:
    image: searxng/searxng:latest
    container_name: hyperspace-searxng
    restart: ${RESTART_POLICY}
    env_file:
      - ./.env
    volumes:
      - ./data/searxng:/etc/searxng:rw
    environment:
      SEARXNG_BASE_URL: "http://localhost:${SEARXNG_PORT:-8092}/"
      SEARXNG_SECRET: "${SEARXNG_SECRET:-hyperspace-searxng-secret}"
    ports:
      - "127.0.0.1:${SEARXNG_PORT:-8092}:8080"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE

  # -- Nodo 1 -----------------------------------------------------------------
  hyperspace-node-1:
    build:
      context: .
      dockerfile: node/Dockerfile
    container_name: hyperspace-node-1
    restart: ${RESTART_POLICY}
    depends_on:
      hyperspace-registry:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      TZ: ${TZ}
      NODE_HOSTNAME: ${NODE_HOSTNAME:-hyperspace-node-1}
      NODE_PORT: "8084"
      NODE_TIER: ${NODE_TIER:-leaf}
      DATA_DIR: /app/data
      PUBLIC_ENDPOINT: ${PUBLIC_ENDPOINT:-}
      BOOT_PEERS: ${BOOT_PEERS:-}
      REGISTRY_URL: http://hyperspace-registry:${REGISTRY_PORT:-8086}
      REGISTRY_PUBLIC_URL: "${REGISTRY_PUBLIC_URL:-https://sanctuary-mower-plated.ngrok-free.dev}"
      CONTROL_PLANE_URL: http://hyperspace-core:8085
      HEARTBEAT_EVERY: "${HEARTBEAT_EVERY:-15}"
      PEER_MAX_AGE_S: "${PEER_MAX_AGE_S:-120}"
      NODE_TTL: "${NODE_TTL:-300}"
      OLLAMA_URL: ${OLLAMA_RAW_BASE_URL}
      OLLAMA_MODEL: ${HS_MODEL_GENERAL}
      INFERENCE_BACKEND: ollama
      VRAM_GB: ${VRAM_GB:-0.0}
      SIGN_REQUESTS: ${SIGN_REQUESTS:-true}
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/node-1:/app/data
    ports:
      - "127.0.0.1:8081:8084"

  # -- Infra-UI Bridge (dashboard SSE, log viewer) ---------------------------
  hyperspace-bridge:
    build:
      context: ./infra-ui
      dockerfile: Dockerfile
    container_name: hyperspace-bridge
    restart: ${RESTART_POLICY}
    depends_on:
      hyperspace-registry:
        condition: service_healthy
      hyperspace-core:
        condition: service_started
    env_file:
      - ./.env
    environment:
      CP_URL: http://hyperspace-core:8085
      REGISTRY_URL: http://hyperspace-registry:${REGISTRY_PORT:-8086}
      POLL_INTERVAL: "${POLL_INTERVAL:-4}"
      PYTHONUNBUFFERED: "1"
    ports:
      - "127.0.0.1:8099:8099"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8099/status"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  # -- Memory Graph (esporta memoria CP -> vault Obsidian) --------------------
  # La titolazione NON usa più un'istanza Ollama dedicata: passa da
  # /task/create + /task/assign del control-plane, riusando lo stesso
  # scoring/routing di qualsiasi altro task della mesh.
  hyperspace-memory-graph:
    build:
      context: ./memory-graph
      dockerfile: Dockerfile
    container_name: hyperspace-memory-graph
    restart: ${RESTART_POLICY}
    depends_on:
      - hyperspace-core
    env_file:
      - ./.env
    environment:
      CP_URL: http://hyperspace-core:8085
      VAULT_PATH: /vault
      EXPORT_INTERVAL: "${MEMORY_EXPORT_INTERVAL:-30}"
      TITLER_ENABLED: "${TITLER_ENABLED:-true}"
      TITLER_MODEL: "${TITLER_MODEL:-qwen2:0.5b}"
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/obsidian-vault:/vault
    ports:
      - "127.0.0.1:8090:8090"

  # -- Obsidian nel browser (KasmVNC) -----------------------------------------
  hyperspace-obsidian:
    image: lscr.io/linuxserver/obsidian:latest
    container_name: hyperspace-obsidian
    restart: ${RESTART_POLICY}
    depends_on:
      - hyperspace-memory-graph
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: ${TZ}
    security_opt:
      - seccomp:unconfined
    volumes:
      - ./data/obsidian-vault:/config/vaults
      - obsidian_config:/config
    ports:
      - "127.0.0.1:8091:3000"
    shm_size: "1gb"

volumes:
  obsidian_config:
