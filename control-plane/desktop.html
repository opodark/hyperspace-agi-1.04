<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HyperSpace AGI — Desktop</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0c10;--panel:#14161c;--border:rgba(255,255,255,.08);
  --txt:#e8e9ee;--muted:#8a8f9c;--p:#00d9c0;--acc:#8b7cf6;
  --ok:#22c55e;--warn:#f59e0b;--err:#ef4444;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
html,body{width:100%;min-height:100%;background:var(--bg);color:var(--txt);font-family:var(--font)}
body{padding:32px 24px 60px;background:
  radial-gradient(circle at 15% 0%, rgba(0,217,192,.08), transparent 40%),
  radial-gradient(circle at 85% 10%, rgba(139,124,246,.08), transparent 40%),
  var(--bg);
}
.wrap{max-width:1100px;margin:0 auto}
header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:28px}
.brand{display:flex;align-items:center;gap:12px}
.brand-text h1{font-size:1.15rem;font-weight:700;letter-spacing:.02em}
.brand-text span{font-size:.75rem;color:var(--muted);font-family:var(--mono)}
#doctor-pill{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:999px;background:var(--panel);border:1px solid var(--border);font-size:.8rem;cursor:pointer;transition:border-color .15s}
#doctor-pill:hover{border-color:rgba(255,255,255,.2)}
#doctor-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0}
#doctor-dot.ok{background:var(--ok);box-shadow:0 0 8px var(--ok)}
#doctor-dot.warn{background:var(--warn);box-shadow:0 0 8px var(--warn)}
#doctor-dot.fail{background:var(--err);box-shadow:0 0 8px var(--err)}
#doctor-label{font-family:var(--mono)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;margin-bottom:32px}
.tile{position:relative;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:20px;text-decoration:none;color:var(--txt);display:flex;flex-direction:column;gap:10px;transition:transform .15s,border-color .15s,background .15s;overflow:hidden}
.tile:hover{transform:translateY(-2px);border-color:rgba(0,217,192,.35);background:#171a21}
.tile-icon{font-size:1.8rem;line-height:1}
.tile-title{font-size:1rem;font-weight:600}
.tile-desc{font-size:.8rem;color:var(--muted);line-height:1.45;flex:1}
.tile-foot{display:flex;align-items:center;justify-content:space-between;font-size:.72rem;font-family:var(--mono);color:var(--muted);margin-top:4px}
.tile-port{opacity:.8}
.tile-status{display:flex;align-items:center;gap:5px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
.dot.up{background:var(--ok);box-shadow:0 0 6px var(--ok)}
.dot.down{background:var(--err)}

.section-title{font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin:28px 0 12px;font-family:var(--mono)}

#doctor-panel{display:none;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:28px}
#doctor-panel.open{display:block}
#doctor-panel h2{font-size:.95rem;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.check-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-top:1px solid var(--border)}
.check-row:first-of-type{border-top:none}
.check-badge{flex-shrink:0;font-size:.65rem;font-family:var(--mono);text-transform:uppercase;padding:2px 7px;border-radius:4px;margin-top:2px}
.check-badge.ok{background:rgba(34,197,94,.12);color:var(--ok)}
.check-badge.warn{background:rgba(245,158,11,.12);color:var(--warn)}
.check-badge.fail{background:rgba(239,68,68,.12);color:var(--err)}
.check-body b{font-size:.85rem;font-weight:600;display:block;margin-bottom:2px}
.check-body p{font-size:.78rem;color:var(--muted);line-height:1.4}
.check-body .fix{font-size:.74rem;color:var(--acc);margin-top:4px;font-family:var(--mono)}
#doctor-empty{font-size:.82rem;color:var(--muted)}

footer{text-align:center;font-size:.72rem;color:var(--muted);font-family:var(--mono);margin-top:20px}
footer a{color:var(--p);text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <svg width="30" height="30" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="13" stroke="#00d9c0" stroke-width="1" opacity=".4"/><circle cx="14" cy="14" r="8" stroke="#00d9c0" stroke-width="1"/><circle cx="14" cy="14" r="3" fill="#00d9c0" opacity=".8"/><ellipse cx="14" cy="14" rx="13" ry="5" stroke="#8b7cf6" stroke-width=".8" opacity=".5"/></svg>
      <div class="brand-text">
        <h1>HyperSpace AGI</h1>
        <span>desktop · tutti i servizi in un posto solo</span>
      </div>
    </div>
    <div id="doctor-pill" onclick="toggleDoctor()">
      <div id="doctor-dot"></div>
      <span id="doctor-label">controllo mesh…</span>
    </div>
  </header>

  <div id="doctor-panel">
    <h2>🩺 Mesh Doctor</h2>
    <div id="doctor-body"><div id="doctor-empty">Caricamento diagnosi…</div></div>
  </div>

  <div class="section-title">Usa la mesh</div>
  <div class="grid" id="grid-use"></div>

  <div class="section-title">Osserva &amp; gestisci</div>
  <div class="grid" id="grid-manage"></div>

  <div class="section-title">Primo avvio</div>
  <div class="grid" id="grid-setup"></div>

  <footer>HyperSpace AGI · generato da <a href="/doctor" target="_blank">/doctor</a> — riapri questa pagina per lo stato aggiornato</footer>
</div>

<script>
const HOST = window.location.hostname;
const SERVICES = {
  use: [
    {icon:'💬', title:'Chat', port:3000, path:'/', desc:'Open WebUI — chatta con la mesh, scegli modelli locali o OmniRoute dal menu.'},
    {icon:'🔀', title:'OmniRoute', port:20128, path:'/', desc:'Gateway verso 278+ provider esterni — fallback e dashboard provider/costi.'},
  ],
  manage: [
    {icon:'📊', title:'Dashboard Mesh', port:8085, path:'/dashboard', desc:'Nodi, task, log, config avanzata — la vista operativa del control-plane.'},
    {icon:'✨', title:'Live 3D', port:8099, path:'/', desc:'Mesh in tempo reale via SSE — nodi, task, memoria, token/s.'},
    {icon:'🧠', title:'Memoria (Obsidian)', port:8091, path:'/', desc:'Vault Obsidian nel browser — ogni interazione della mesh diventa una nota collegata.'},
  ],
  setup: [
    {icon:'🧙', title:'Setup Wizard', port:8088, path:'/', desc:'Primo avvio: configura .env, scarica modelli, imposta la specializzazione del nodo.'},
  ],
};

function render(){
  for (const section of Object.keys(SERVICES)){
    const grid = document.getElementById('grid-'+section);
    grid.innerHTML = SERVICES[section].map((s,i)=>{
      const url = `http://${HOST}:${s.port}${s.path}`;
      const id = `${section}-${i}`;
      return `<a class="tile" href="${url}" target="_blank" rel="noopener" data-check="${url}" id="tile-${id}">
        <div class="tile-icon">${s.icon}</div>
        <div class="tile-title">${s.title}</div>
        <div class="tile-desc">${s.desc}</div>
        <div class="tile-foot"><span class="tile-port">:${s.port}</span><span class="tile-status"><span class="dot" id="dot-${id}"></span><span id="stat-${id}">…</span></span></div>
      </a>`;
    }).join('');
  }
  // Ping leggero per ogni tile (HEAD/GET con no-cors: non possiamo leggere lo
  // status reale cross-origin, ma un fetch che non lancia errore di rete è
  // già un buon segnale "il servizio risponde a qualcosa su questa porta".
  document.querySelectorAll('[data-check]').forEach(el=>{
    const url = el.dataset.check, id = el.id.replace('tile-','');
    fetch(url, {mode:'no-cors', signal: AbortSignal.timeout(4000)})
      .then(()=>setDot(id, true))
      .catch(()=>setDot(id, false));
  });
}
function setDot(id, up){
  const dot = document.getElementById('dot-'+id), stat = document.getElementById('stat-'+id);
  if(!dot) return;
  dot.className = 'dot ' + (up ? 'up' : 'down');
  stat.textContent = up ? 'su' : 'giù?';
}

let doctorOpen = false;
function toggleDoctor(){
  doctorOpen = !doctorOpen;
  document.getElementById('doctor-panel').classList.toggle('open', doctorOpen);
}
async function loadDoctor(){
  try{
    const r = await fetch(`http://${HOST}:8085/doctor`, {signal: AbortSignal.timeout(6000)});
    const d = await r.json();
    const dot = document.getElementById('doctor-dot'), label = document.getElementById('doctor-label');
    dot.className = d.status;
    const nWarn = d.checks.filter(c=>c.status!=='ok').length;
    label.textContent = d.status==='ok' ? 'mesh sana' : `${nWarn} da controllare`;
    document.getElementById('doctor-body').innerHTML = d.checks.map(c=>`
      <div class="check-row">
        <span class="check-badge ${c.status}">${c.status}</span>
        <div class="check-body">
          <b>${c.name}</b>
          <p>${c.detail}</p>
          ${c.fix_hint ? `<div class="fix">→ ${c.fix_hint}</div>` : ''}
        </div>
      </div>`).join('');
  }catch(e){
    document.getElementById('doctor-label').textContent = 'control-plane irraggiungibile';
    document.getElementById('doctor-dot').className = 'fail';
    document.getElementById('doctor-empty').textContent = 'Impossibile contattare /doctor: ' + e;
  }
}

render();
loadDoctor();
setInterval(loadDoctor, 30000);
</script>
</body>
</html>
