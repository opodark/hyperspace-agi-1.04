version: '3.9'

services:
  control-plane:
    build: .
    command: npm run start:control-plane
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    environment:
      - NODE_ENV=development

  msty-adapter:
    build: ./msty-adapter
    depends_on:
      - control-plane
    environment:
      - MSTY_ENDPOINT=http://localhost:3001

  # Placeholder for registry, web-node, etc.
  # registry:
  #   ...

networks:
  hyperspace-net:
    driver: bridge
