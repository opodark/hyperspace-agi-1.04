version: '3.8'

services:

  # --------------------
  # EVENT BUS
  # --------------------
  nats:
    image: nats:latest
    container_name: hyperspace_nats
    ports:
      - "4222:4222"
    networks:
      - hyperspace

  # --------------------
  # OLLAMA — LLM locale
  # --------------------
  ollama:
    image: ollama/ollama:latest
    container_name: hyperspace_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - hyperspace
    # Per GPU Nvidia: decommentare le righe seguenti
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # --------------------
  # AUTHORITY
  # --------------------
  authority:
    build:
      context: .
      dockerfile: authority/Dockerfile
    container_name: hyperspace_authority
    ports:
      - "8080:8080"
    environment:
      PYTHONUNBUFFERED: "1"
    networks:
      - hyperspace
    restart: unless-stopped

  # --------------------
  # CONTROL PLANE
  # --------------------
  control-plane:
    build:
      context: .
      dockerfile: control-plane/Dockerfile
    container_name: hyperspace_control_plane
    depends_on:
      - nats
      - authority
    ports:
      - "8085:8085"
    environment:
      PYTHONUNBUFFERED: "1"
    networks:
      - hyperspace
    restart: unless-stopped

  # --------------------
  # WORKER NODE
  # --------------------
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: hyperspace_worker_1
    depends_on:
      - nats
      - authority
      - ollama
    ports:
      - "8084:8084"
    environment:
      WORKER_ID: worker-1
      WORKER_PORT: "8084"
      AUTHORITY_URL: http://authority:8080
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: phi3
      PYTHONUNBUFFERED: "1"
    networks:
      - hyperspace
    restart: unless-stopped

networks:
  hyperspace:
    driver: bridge

volumes:
  ollama_data:
