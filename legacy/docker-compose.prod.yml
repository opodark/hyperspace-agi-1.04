version: '3.8'

# ============================================================
# HyperSpace AGI v1.02 — Compose PRODUZIONE
#
# Architettura a due hub (esempi):
#   Mac    → PUBLIC_ENDPOINT=https://your-mac-public-endpoint.example
#   Ubuntu → PUBLIC_ENDPOINT=https://your-ubuntu-public-endpoint.example
#
# Uso:
#   Mac:    cp .env.mac .env && docker compose -f docker-compose.prod.yml up -d --build
#   Ubuntu: cp .env.ubuntu .env && docker compose -f docker-compose.prod.yml up -d --build
#
# Dashboard:   http://localhost:8085/dashboard
# Node API:    http://localhost:8084/status
# Registry:    http://localhost:8086/nodes
# Ollama Proxy (WebUI): http://localhost:11435
#
# IMPORTANTE: punta Open WebUI a http://localhost:11435
# invece di http://localhost:11434 per abilitare la memoria collettiva.
# ============================================================

services:

  # ── Open WebUI ──────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: hyperspace_open_webui
    ports:
      - "3000:8080"
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      # WebUI deve parlare al control-plane OpenAI-compatible (/v1/chat/completions),
      # non al proxy del nodo (11435, solo passthrough Ollama senza tool-calling):
      # solo così passa dal tool-calling loop (incluso web_search) e alimenta comunque
      # la memoria collettiva, che il control-plane logga instradando verso il nodo.
      OPENAI_API_BASE_URL: "http://control-plane:8085/v1"
      OPENAI_API_KEY: "dummy"
      ENABLE_OLLAMA_API: "false"
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-hyperspace-secret-change-me}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hyperspace
    restart: unless-stopped
    depends_on:
      - control-plane

  # ── Nodo agente (hub su Mac/Ubuntu, leaf su altri) ──────
  node:
    build:
      context: .
      dockerfile: node/Dockerfile
    container_name: hyperspace_node
    ports:
      - "8084:8084"
      - "11435:11435"
    volumes:
      - ./data/node:/app/data
    environment:
      NODE_HOSTNAME: ${NODE_HOSTNAME:-node}
      NODE_PORT: "8084"
      PROXY_PORT: "11435"
      DATA_DIR: /app/data
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
      NODE_TIER: ${NODE_TIER:-leaf}
      VRAM_GB: ${VRAM_GB:-0.0}
      SIGN_REQUESTS: ${SIGN_REQUESTS:-true}
      HEARTBEAT_EVERY: ${HEARTBEAT_EVERY:-15}
      PUBLIC_ENDPOINT: ${PUBLIC_ENDPOINT:-}
      BOOT_PEERS: ${BOOT_PEERS:-}
      CONTROL_PLANE_URL: ${CONTROL_PLANE_URL:-http://control-plane:8085}
      REGISTRY_URL: ${REGISTRY_URL:-http://registry:8086}
      NODE_ID: ""
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hyperspace
    restart: unless-stopped
    depends_on:
      - registry

  # ── Control Plane + Dashboard ────────────────────────────
  control-plane:
    build:
      context: .
      dockerfile: control-plane/Dockerfile
    container_name: hyperspace_control_plane
    depends_on:
      - node
      - registry
    ports:
      - "8085:8085"
    environment:
      NODE_ENDPOINTS: ${NODE_ENDPOINTS:-node:8084}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
      AUTHORITY_ENABLED: "false"
      PUBLIC_ENDPOINT: ${PUBLIC_ENDPOINT:-}
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hyperspace
    restart: unless-stopped

  # ── Registry ──────────────────────────────────────────
  registry:
    build:
      context: ./registry
      dockerfile: Dockerfile
    container_name: hyperspace_registry
    ports:
      - "8086:8086"
    volumes:
      - ./data/registry:/app/data
    environment:
      REGISTRY_PORT: ${REGISTRY_PORT:-8086}
      NODE_TTL: ${NODE_TTL:-60}
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hyperspace
    restart: unless-stopped

  # ── Ollama-in-Docker (legacy, opzionale) ────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: hyperspace_ollama
    profiles: ["with-ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - hyperspace
    restart: unless-stopped

networks:
  hyperspace:
    driver: bridge

volumes:
  open_webui_data:
  ollama_data:
